services:
  - type: web
    name: siou-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -e .
    startCommand: python scripts/index_documents.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api
      - key: CORS_ORIGINS
        value: "*"
      - key: DOCUMENTS_DIR
        value: documents
      - key: DOCUMENT_INCLUDE_PATTERNS
        value: "*.pdf,*.docx"
      - key: VECTOR_STORE_DIR
        value: vector_store
      - key: CHUNK_SIZE
        value: "1200"
      - key: CHUNK_OVERLAP
        value: "220"
      - key: TOP_K
        value: "6"
      - key: MIN_CONFIDENCE
        value: "0.18"
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_CHAT_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_TEMPERATURE
        value: "0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: siou-postgres
          property: connectionString

databases:
  - name: siou-postgres
    plan: basic-256mb
    databaseName: siou
    user: siou_user
    ipAllowList:
      - source: 0.0.0.0/0
        description: external-test-access
